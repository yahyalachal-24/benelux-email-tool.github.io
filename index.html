<style>
body {

}

.container {
  max-width: 900px;
  margin: auto;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
  color: #333;
}

/* Menu buttons */
#menu {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 25px;
}

.menu-btn {
  padding: 12px 25px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  color: white;
  cursor: pointer;
  background: #0078D4;
  transition: background 0.3s;
}

.menu-btn:hover {
  background: #005ea2;
}

/* Sections */
.section {
  display: none;
  background: white;
  margin-bottom: 20px;
  border-radius: 10px;
  box-shadow: 0 3px 12px rgba(0,0,0,0.1);
  padding: 15px 20px;
}

.section h2 {
  margin-top: 0;
  color: #0078D4;
}

/* Action buttons */
.button {
  display: block;
  background: #0078D4;
  color: white;
  padding: 12px;
  margin: 8px 0;
  border-radius: 6px;
  text-decoration: none;
  text-align: center;
  font-weight: bold;
  transition: background 0.3s;
}

.button:hover {
  background: #005ea2;
}

/* Responsive */
@media (max-width: 600px){
  .menu-btn { width: 100%; }
}
</style>

<script>
function sendMail(to, subject, body){
    const link = "mailto:" + to + "?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body);
    window.location.href = link;
}

/* Show only one section */
function showSection(id){
    const sections = document.querySelectorAll('.section');
    sections.forEach(s => s.style.display = 'none');
    const section = document.getElementById(id);
    if(section) section.style.display = 'block';
}

/* Show all sections */
function showAll(){
    const sections = document.querySelectorAll('.section');
    sections.forEach(s => s.style.display = 'block');
}
</script>
